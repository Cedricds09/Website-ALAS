<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ALAS · Panel interno</title>
  <link rel="stylesheet" href="main.css" />
  <style>
    .admin-wrap { max-width: 1100px; margin: 2rem auto; padding: 0 1.2rem; }
    .admin-grid { display: grid; grid-template-columns: 1fr 1.3fr; gap: 1.5rem; }
    @media (max-width: 900px) { .admin-grid { grid-template-columns: 1fr; } }
    .admin-card {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 1.2rem;
    }
    .admin-card h2 { margin: 0 0 1rem; font-size: 1.05rem; }
    .svc-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    .svc-table th, .svc-table td {
      text-align: left; padding: 0.55rem 0.5rem;
      border-bottom: 1px solid var(--color-border);
      vertical-align: top;
    }
    .svc-table th { color: var(--color-silver-3); font-weight: 600; }
    .svc-empty { padding: 1rem; color: var(--color-silver-2); text-align: center; }
    .badge {
      display: inline-block; padding: 0.15rem 0.55rem; border-radius: 999px;
      font-size: 0.72rem; letter-spacing: 0.05em; text-transform: uppercase;
    }
    .badge.PEND { background: #4d3a00; color: #ffd97a; }
    .badge.PROC { background: #093e69; color: #8fcdff; }
    .badge.TERM { background: #143b1f; color: #8de7a8; }
    .toast {
      position: fixed; bottom: 1.2rem; right: 1.2rem;
      background: #143b1f; color: #d2ffe0;
      padding: 0.85rem 1.1rem; border-radius: 8px;
      border: 1px solid #2a6b3d; max-width: 360px;
      transform: translateY(20px); opacity: 0; transition: all 240ms ease;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.error { background: #3b1414; color: #ffb4bb; border-color: #6e2a2a; }
  </style>
</head>
<body>
  <header class="nav">
    <div class="nav-inner">
      <a href="/" class="brand">
        <img src="imagenes/logoprincipal.png" alt="Logo ALAS" class="brand-logo" />
        <span class="brand-text">ALAS · Admin</span>
      </a>
    </div>
  </header>

  <main class="admin-wrap">
    <div class="admin-grid">
      <section class="admin-card">
        <h2>Nuevo servicio</h2>
        <form id="svcForm" class="form">
          <label><span>Número de cliente</span>
            <input type="text" name="numero_cliente" required />
          </label>
          <label><span>Nombre del cliente</span>
            <input type="text" name="nombre_cliente" required placeholder="Nombre Apellido" />
          </label>
          <label><span>Teléfono</span>
            <input type="tel" name="telefono" placeholder="55 0000 0000" />
          </label>
          <label><span>Descripción del trabajo</span>
            <textarea name="descripcion" rows="3" required></textarea>
          </label>
          <label><span>Total</span>
            <input type="number" name="total" min="0" step="0.01" required />
          </label>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Crear servicio</button>
          </div>
        </form>
      </section>

      <section class="admin-card">
        <h2>Servicios activos</h2>
        <div id="svcList"></div>
      </section>
    </div>
  </main>

  <div id="toast" class="toast"></div>

  <script src="admin.js"></script>
</body>
</html>
